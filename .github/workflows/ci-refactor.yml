name: CI/CD Pipeline

on:
  push:
    branches:
      - imported-changes
  pull_request:
    branches:
      - imported-changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build

      - name: Deploy to Server
        if: success()
        run: |
          # Comandos para desplegar la aplicación
          # Por ejemplo, usando rsync o scp para transferir archivos al servidor
          # ssh para reiniciar servicios, etc.
